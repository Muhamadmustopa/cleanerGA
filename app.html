<!DOCTYPE html>
<html lang="id">

<head>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>Sistem Log Dokumen</title>
</head>

<body>

<header class="header">

<div class="header-top">

<div class="title">
Sistem Log Dokumen - <span id="userDisplay"></span>
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<div class="nav">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('input')">Input</button>
<button onclick="showPage('log')">Log Dokumen</button>

</div>
</header>


<div class="container">

<!-- DASHBOARD -->

<div id="dashboard" class="card">

<h2>Dashboard</h2>

<div class="stats">

<div class="stat stat-total" onclick="filterStatus('all')">
Total
<h3 id="total">0</h3>
</div>

<div class="stat stat-pending" onclick="filterStatus('Pending')">
Pending
<h3 id="pending">0</h3>
</div>

<div class="stat stat-done" onclick="filterStatus('Selesai')">
Selesai
<h3 id="done">0</h3>
</div>
</div>

</div>

</div>


<!-- INPUT -->

<div id="input" class="card" style="display:none">

<h2>Input Paket</h2>

<input id="pengirim" placeholder="Pengirim">

<select id="jenis">
<option>Surat</option>
<option>Barang</option>
<option>Makanan</option>
</select>

<input id="penerima" placeholder="Penerima">

<input id="pic" readonly>

<button class="primary" onclick="tambah()">Tambah</button>

<div id="spinner" class="spinner"></div>

</div>

<div id="uploadSpinner" class="spinner"></div>
<!-- LOG -->

<div id="log" class="card" style="display:none">

<div class="filter-bar">

<div class="filter-search">
<input id="search" placeholder="Cari dokumen..." onkeyup="render()">
</div>

<div class="filter-date">
<input type="date" id="startDate" onchange="render()">
<input type="date" id="endDate" onchange="render()">
</div>

<div class="filter-action" id="adminActions"></div>

</div>

<input 
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
style="display:none"
>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Pengirim</th>
<th>Jenis</th>
<th>Penerima</th>
<th>PIC</th>
<th>Jam</th>
<th>Status</th>
<th>Foto</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
  
<div id="pagination" style="margin-top:15px;text-align:center">

<button onclick="prevPage()">Previous</button>

<span id="pageInfo" style="margin:0 10px"></span>

<button onclick="nextPage()">Next</button>

</div>
<div id="mobileList" class="mobile-list"></div>

</div>

</div>

  </div>
</div>
<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDfwgOnJzXn8ESDw-9siMhYP-TFJcuNFx4",
  authDomain: "tracking-doc-96d7f.firebaseapp.com",
  projectId: "tracking-doc-96d7f",
  storageBucket: "tracking-doc-96d7f.appspot.com",
  messagingSenderId: "511985866729",
  appId: "1:511985866729:web:68bf00705f680b55159d78"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// USER CHECK
let currentUser = localStorage.getItem("pic_user");
if (!currentUser) location.href = "dokumen.html";

document.getElementById("userDisplay").innerText = currentUser;
document.getElementById("pic").value = currentUser;


// STATE
let data = [];
let selectedId = null;
let currentFilter = "all";
let currentPage = 1;
const rowsPerPage = 10;


// NAVIGATION
function showPage(page){
["dashboard","input","log"].forEach(id=>{
document.getElementById(id).style.display="none";
});
document.getElementById(page).style.display="block";
}


// FILTER
function filterStatus(status){
currentFilter = currentFilter === status ? "all" : status;
currentPage = 1;
showPage("log");
render();
}
// access export file 
if(currentUser === "Topa"){
document.getElementById("adminActions").innerHTML = `
<button class="icon-btn" onclick="exportExcel()" title="Export Excel">
<i class="fas fa-file-excel"></i>
</button>

<button class="icon-btn" onclick="exportPDF()" title="Export PDF">
<i class="fas fa-file-pdf"></i>
</button>
`;
}

function exportExcel(){

const rows = data.map(d=>({
Tanggal: formatTanggal(d.tanggal),
Jam: formatJam(d.tanggal),
Pengirim: d.pengirim,
Jenis: d.jenis,
Penerima: d.penerima,
PIC: d.pic,
Status: d.status
}));

const worksheet = XLSX.utils.json_to_sheet(rows);
const workbook = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(workbook, worksheet, "Data Dokumen");

XLSX.writeFile(workbook, "dokumen.xlsx");

}

async function exportPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y = 10;

doc.setFontSize(12);
doc.text("Laporan Dokumen", 10, y);
y += 10;

data.forEach((d,i)=>{

const text = `${i+1}. ${formatTanggal(d.tanggal)} - ${d.pengirim} → ${d.penerima} (${d.status})`;

doc.text(text, 10, y);
y += 7;

if(y > 280){
doc.addPage();
y = 10;
}

});

doc.save("dokumen.pdf");

}
// LOAD DATA
async function loadData(){

const snapshot = await db.collection("dokumen")
.orderBy("tanggal","desc")
.get();

data = snapshot.docs.map(doc=>({
id:doc.id,
...doc.data()
}));

render();
}

loadData();


// FORMAT TANGGAL
function formatTanggal(t){

if(!t) return "";

if(t.seconds){
return new Date(t.seconds*1000).toLocaleDateString("id-ID");
}

return new Date(t).toLocaleDateString("id-ID");

}


// FORMAT JAM
function formatJam(t){

if(!t) return "";

if(t.seconds){
return new Date(t.seconds*1000).toLocaleTimeString("id-ID");
}

return new Date(t).toLocaleTimeString("id-ID");

}


// RENDER
function render(){

const search = document.getElementById("search").value.toLowerCase();
const tbody = document.getElementById("tableBody");
const mobile = document.getElementById("mobileList");

tbody.innerHTML="";
mobile.innerHTML="";

let pending=0;
let done=0;

// ✅ FIX: nama variable jelas
const startDate = document.getElementById("startDate").value;
const endDate = document.getElementById("endDate").value;

let filtered = data.filter(d=>{

const matchSearch =
(d.pengirim||"").toLowerCase().includes(search) ||
(d.penerima||"").toLowerCase().includes(search);

// ✅ FIX: pakai startDate & endDate
let matchDate = true;

if(startDate && endDate){
const tgl = new Date(d.tanggal.seconds ? d.tanggal.seconds*1000 : d.tanggal);

matchDate = tgl >= new Date(startDate) && tgl <= new Date(endDate);
}

return matchSearch && matchDate;

});

if(currentFilter!=="all"){
filtered = filtered.filter(d=>d.status===currentFilter);
}

const totalPages = Math.ceil(filtered.length/rowsPerPage) || 1;

if(currentPage>totalPages){
currentPage = totalPages;
}

// ✅ FIX: pagination pakai nama beda
const startIndexPage = (currentPage-1)*rowsPerPage;
const pageData = filtered.slice(startIndexPage,startIndexPage+rowsPerPage);

pageData.forEach(d=>{

if(d.status==="Pending") pending++;
if(d.status==="Selesai") done++;

tbody.innerHTML += `
<tr>

<td>${formatTanggal(d.tanggal)}</td>
<td>${d.pengirim}</td>
<td>${d.jenis}</td>
<td>${d.penerima}</td>
<td>${d.pic}</td>
<td>${formatJam(d.tanggal)}</td>

<td class="${d.status==="Pending"?"status-pending":"status-done"}">
${d.status}
</td>

<td>
<img src="${d.foto}" class="preview-img" onclick="openModal('${d.foto}')">
</td>

<td class="actions">

${d.status==="Pending"
? `<button class="btn-green" onclick="openCamera('${d.id}')">Diterima</button>`
: ""}

${currentUser === "Topa"
? `<button class="btn-red" onclick="hapus('${d.id}')">🗑️</button>`
: ""}

</td>

</tr>
`;

mobile.innerHTML += `
<div class="mobile-card">

<div class="mobile-row">
<span>Tanggal</span>
<span>${formatTanggal(d.tanggal)}</span>
</div>

<div class="mobile-row">
<span>Jenis</span>
<span>${d.jenis}</span>
</div>

<div class="mobile-row">
<span>Pengirim</span>
<span>${d.pengirim}</span>
</div>

<div class="mobile-row">
<span>Penerima</span>
<span>${d.penerima}</span>
</div>

<div class="mobile-row">
<span>PIC</span>
<span>${d.pic}</span>
</div>

<div class="mobile-row">
<span>Status</span>
<span>${d.status}</span>
</div>

${d.foto ? `<img src="${d.foto}" class="preview-img" onclick="window.open('${d.foto}')">` : ""}

<div class="mobile-actions">

${d.status==="Pending"
? `<button class="btn-green" onclick="openCamera('${d.id}')">Diterima</button>`
: ""}

${currentUser === "Topa"
? `<button class="btn-red" onclick="hapus('${d.id}')">Hapus</button>`
: ""}

</div>

</div>
`;

});

document.getElementById("total").innerText = data.length;
document.getElementById("pending").innerText = pending;
document.getElementById("done").innerText = done;

document.getElementById("pageInfo").innerText =
"Page "+currentPage+" / "+totalPages;

}

// PAGINATION
function nextPage(){
currentPage++;
render();
}

function prevPage(){
if(currentPage>1){
currentPage--;
render();
}
}


// TAMBAH DATA
async function tambah(){

const btn = document.querySelector(".primary");
const spinner = document.getElementById("spinner");

// 🔥 disable tombol + tampilkan spinner
btn.disabled = true;
btn.innerText = "Menyimpan...";
spinner.style.display="block";

try{

await db.collection("dokumen").add({

tanggal:new Date(),
pengirim:pengirim.value,
jenis:jenis.value,
penerima:penerima.value,
pic:currentUser,
status:"Pending",
foto:""

});

// reset input
pengirim.value="";
penerima.value="";

// 🔥 NOTIF SUKSES
showNotif("Data berhasil ditambahkan ✅");

}catch(err){

showNotif("Gagal tambah data ❌");

}

// 🔥 balikin tombol normal
btn.disabled = false;
btn.innerText = "Tambah";
spinner.style.display="none";

loadData();

}

  function showNotif(msg){

const notif = document.createElement("div");
notif.innerText = msg;

notif.style.position = "fixed";
notif.style.top = "20px";
notif.style.right = "20px";
notif.style.background = "#16a34a";
notif.style.color = "white";
notif.style.padding = "10px 15px";
notif.style.borderRadius = "8px";
notif.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
notif.style.zIndex = "9999";
notif.style.fontSize = "14px";

document.body.appendChild(notif);

// hilang otomatis
setTimeout(()=>{
notif.remove();
},2000);

}
// CAMERA
function openCamera(id){
selectedId = id;
document.getElementById("cameraInput").click();
}


// COMPRESS IMAGE
function compressImage(file){

return new Promise(resolve=>{

const img = new Image();
const reader = new FileReader();

reader.onload = e => img.src = e.target.result;
reader.readAsDataURL(file);

img.onload = ()=>{

const canvas = document.createElement("canvas");

// 🔥 RESIZE (lebih kecil = lebih hemat)
const MAX_WIDTH = 600; // sebelumnya 800 → kita kecilin

let width = img.width;
let height = img.height;

if(width > MAX_WIDTH){
height *= MAX_WIDTH/width;
width = MAX_WIDTH;
}

canvas.width = width;
canvas.height = height;

const ctx = canvas.getContext("2d");

// gambar
ctx.drawImage(img,0,0,width,height);

// 🔥 TIMESTAMP
const now = new Date();
const tanggal = now.toLocaleDateString("id-ID");
const jam = now.toLocaleTimeString("id-ID");
const text = `${tanggal} ${jam}`;

// background transparan biar kebaca
ctx.fillStyle = "rgba(0,0,0,0.4)";
ctx.fillRect(width - 180, height - 35, 170, 25);

// text
ctx.font = "bold 14px Arial"; // kecilin font biar ringan
ctx.fillStyle = "white";
ctx.textAlign = "right";
ctx.fillText(text, width - 10, height - 15);

// 🔥 COMPRESS (ini paling ngaruh)
canvas.toBlob(
(blob)=>resolve(blob),
"image/jpeg",
0.6 // sebelumnya 0.7 → lebih kecil
);

};

});

}


// UPLOAD FOTO
cameraInput.addEventListener("change",async function(){

const originalFile = this.files[0];
if(!originalFile) return;

const spinner = document.getElementById("uploadSpinner");
spinner.style.display="block";

try{

const file = await compressImage(originalFile);

const formData = new FormData();
formData.append("file",file);
formData.append("upload_preset","dokumen_upload");

const res = await fetch(
"https://api.cloudinary.com/v1_1/duonehce3/image/upload",
{method:"POST",body:formData}
);

const result = await res.json();

if(!result.secure_url){
throw new Error("Upload gagal");
}

await db.collection("dokumen")
.doc(selectedId)
.update({
status:"Selesai",
foto:result.secure_url
});

alert("Berhasil upload");

}catch(err){

alert("Upload gagal: "+err.message);

}

spinner.style.display="none";
loadData();

});


// DELETE
async function hapus(id){

if(currentUser !== "Topa"){
alert("Anda tidak memiliki akses untuk menghapus data");
return;
}

if(!confirm("Yakin ingin menghapus data ini ?")) return;

await db.collection("dokumen")
.doc(id)
.delete();

loadData();

}


// LOGOUT
function logout(){
localStorage.removeItem("pic_user");
location.href="dokumen.html";
}

function openModal(src){
  document.getElementById("imageModal").style.display = "block";
  document.getElementById("modalImg").src = src;
}

function closeModal(){
  document.getElementById("imageModal").style.display = "none";
}
window.onclick = function(event){
  const modal = document.getElementById("imageModal");
  if(event.target === modal){
    modal.style.display = "none";
  }
}
</script>
<div class="footer">
© 2026 TrackDocMAP
</div>
<div id="imageModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="modalImg">
</div>

</body>
</html>
