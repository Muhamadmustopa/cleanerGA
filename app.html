```html
<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sistem Log Dokumen</title>

<style>

*{box-sizing:border-box}

body{
font-family:Segoe UI;
margin:0;
background:#f1f5f9;
}

/* HEADER */

.header{
background:#1e3a8a;
color:white;
padding:15px;
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.title{
font-weight:bold;
font-size:16px;
}

.logout-btn{
background:#ef4444;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.nav{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.nav button{
background:white;
color:#1e3a8a;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

button.primary{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* DASHBOARD */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.stat{
background:#e2e8f0;
padding:20px;
border-radius:10px;
text-align:center;
}

.stat h3{
margin:0;
font-size:28px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f1f5f9;
}

.status-pending{
color:#dc2626;
font-weight:bold;
}

.status-done{
color:#16a34a;
font-weight:bold;
}

.actions{
display:flex;
gap:5px;
flex-wrap:wrap;
}

.btn-green{
background:#16a34a;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.btn-red{
background:#dc2626;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.preview-img{
width:60px;
border-radius:6px;
cursor:pointer;
}

/* MOBILE CARD */

.mobile-list{
display:none;
}

.mobile-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.mobile-row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:14px;
}

.mobile-actions{
display:flex;
gap:8px;
margin-top:10px;
}

/* MOBILE MODE */

@media(max-width:768px){

table{
display:none;
}

.mobile-list{
display:flex;
flex-direction:column;
gap:12px;
}

}

/* SPINNER */

.spinner{
display:none;
width:30px;
height:30px;
border:4px solid #e5e7eb;
border-top:4px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
margin-top:10px;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* TOAST */

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
display:none;
}

</style>

</head>

<body>

<header class="header">

<div class="header-top">

<div class="title">
Sistem Log Dokumen - <span id="userDisplay"></span>
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<div class="nav">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('input')">Input</button>
<button onclick="showPage('log')">Log Dokumen</button>

</div>

</header>


<div class="container">

<!-- DASHBOARD -->

<div id="dashboard" class="card">

<h2>Dashboard</h2>

<div class="stats">

<div class="stat">
Total
<h3 id="total">0</h3>
</div>

<div class="stat">
Pending
<h3 id="pending">0</h3>
</div>

<div class="stat">
Selesai
<h3 id="done">0</h3>
</div>

</div>

</div>


<!-- INPUT -->

<div id="input" class="card" style="display:none">

<h2>Input Paket</h2>

<input id="pengirim" placeholder="Pengirim">

<select id="jenis">
<option>Surat</option>
<option>Barang</option>
<option>Makanan</option>
</select>

<input id="penerima" placeholder="Penerima">

<input id="pic" readonly>

<button class="primary" onclick="tambah()">Tambah</button>

<div id="spinner" class="spinner"></div>

</div>


<!-- LOG -->

<div id="log" class="card" style="display:none">

<input 
id="search"
placeholder="Cari dokumen..."
onkeyup="render()"
>

<input 
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
style="display:none"
>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Pengirim</th>
<th>Jenis</th>
<th>Penerima</th>
<th>PIC</th>
<th>Jam</th>
<th>Status</th>
<th>Foto</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div id="mobileList" class="mobile-list"></div>

</div>

</div>


<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzDZSLNVKsWxMVLBjI2lREtfcd1MrLVGLw_VC2rfaM-_Hb1Zx7ndmomQmFtjJKaP31uoQ/exec"

let currentUser = localStorage.getItem("pic_user")

if(!currentUser){
window.location.href="dokumen.html"
}

document.getElementById("userDisplay").innerText=currentUser

document.getElementById("pic").value=currentUser

let data=[]
let selectedRow=null


function showPage(p){

["dashboard","input","log"].forEach(id=>{
document.getElementById(id).style.display="none"
})

document.getElementById(p).style.display="block"

}


async function loadData(){

const res=await fetch(scriptURL)
const raw=await res.json()

data=raw.map((d,i)=>({...d,_row:i+2}))

render()

}

loadData()


function render(){

const search=document.getElementById("search").value.toLowerCase()
const tbody=document.getElementById("tableBody")
const mobile=document.getElementById("mobileList")

tbody.innerHTML=""
mobile.innerHTML=""

let pending=0
let done=0

data
.filter(d=>
(d.pengirim||"").toLowerCase().includes(search) ||
(d.penerima||"").toLowerCase().includes(search)
)

.forEach(d=>{

if(d.status==="Pending") pending++
if(d.status==="Selesai") done++

tbody.innerHTML+=`

<tr>

<td>${formatTanggal(d.tanggal)}</td>
<td>${d.pengirim||""}</td>
<td>${d.jenis||""}</td>
<td>${d.penerima||""}</td>
<td>${d.pic||""}</td>
<td>${d.jam||"-"}</td>

<td class="${d.status=="Pending"?"status-pending":"status-done"}">
${d.status}
</td>

<td>
${d.foto?`<a href="${d.foto}" target="_blank"><img src="${d.foto}" class="preview-img"></a>`:"-"}
</td>

<td>

<div class="actions">

${d.status=="Pending"
?`<button class="btn-green" onclick="openCamera(${d._row})">Diterima</button>`
:""}

${d.pic===currentUser
?`<button class="btn-red" onclick="hapus(${d._row})">Delete</button>`
:""}

</div>

</td>

</tr>

`

mobile.innerHTML+=`

<div class="mobile-card">

<div class="mobile-row">
<b>Tanggal</b>
<span>${formatTanggal(d.tanggal)}</span>
</div>

<div class="mobile-row">
<b>Pengirim</b>
<span>${d.pengirim}</span>
</div>

<div class="mobile-row">
<b>Penerima</b>
<span>${d.penerima}</span>
</div>

<div class="mobile-row">
<b>Status</b>
<span>${d.status}</span>
</div>

<div class="mobile-actions">

${d.status=="Pending"
?`<button class="btn-green" onclick="openCamera(${d._row})">Diterima</button>`
:""}

${d.pic===currentUser
?`<button class="btn-red" onclick="hapus(${d._row})">Delete</button>`
:""}

</div>

</div>

`

})

document.getElementById("total").innerText=data.length
document.getElementById("pending").innerText=pending
document.getElementById("done").innerText=done

}


function formatTanggal(t){

if(!t) return ""

const date=new Date(t)

return date.toLocaleDateString("id-ID",{
day:"2-digit",
month:"2-digit",
year:"numeric"
})

}


function openCamera(row){

selectedRow=row
document.getElementById("cameraInput").click()

}


document.getElementById("cameraInput").addEventListener("change",function(){

const file=this.files[0]
if(!file) return

const reader=new FileReader()

reader.onloadend=async function(){

const base64=reader.result.split(",")[1]

await fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
action:"terima",
row:selectedRow,
foto:base64
})
})

alert("Dokumen diterima")

setTimeout(loadData,1500)

}

reader.readAsDataURL(file)

})


async function hapus(row){

if(confirm("Hapus data?")){

await fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
action:"delete",
row:row
})
})

setTimeout(loadData,1000)

}

}


async function tambah(){

const spinner=document.getElementById("spinner")
const toast=document.getElementById("toast")

spinner.style.display="block"

const payload={
action:"add",
tanggal:new Date().toISOString(),
pengirim:document.getElementById("pengirim").value,
jenis:document.getElementById("jenis").value,
penerima:document.getElementById("penerima").value,
pic:currentUser
}

await fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(payload)
})

document.getElementById("pengirim").value=""
document.getElementById("penerima").value=""

spinner.style.display="none"

toast.style.display="block"

setTimeout(()=>{toast.style.display="none"},3000)

setTimeout(loadData,1000)

}


function logout(){

if(confirm("Keluar dari sistem?")){

localStorage.removeItem("pic_user")
window.location.href="dokumen.html"

}

}

</script>


<div id="toast" class="toast">
Data berhasil ditambahkan
</div>

</body>
</html>
```
