<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sistem Log Dokumen</title>

<style>
/* (CSS kamu tetap — tidak diubah biar singkat) */
</style>

<body>

<header class="header">
<div class="header-top">
<div class="title">
Sistem Log Dokumen - <span id="userDisplay"></span>
</div>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="nav">
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('input')">Input</button>
<button onclick="showPage('log')">Log Dokumen</button>
</div>
</header>

<div class="container">

<div id="dashboard" class="card">
<h2>Dashboard</h2>
<div class="stats">
<div class="stat" onclick="filterStatus('all')">Total<h3 id="total">0</h3></div>
<div class="stat" onclick="filterStatus('Pending')">Pending<h3 id="pending">0</h3></div>
<div class="stat" onclick="filterStatus('Selesai')">Selesai<h3 id="done">0</h3></div>
</div>
</div>

<div id="input" class="card" style="display:none">
<h2>Input Paket</h2>

<input id="pengirim" placeholder="Pengirim">
<select id="jenis">
<option>Surat</option>
<option>Barang</option>
<option>Makanan</option>
</select>
<input id="penerima" placeholder="Penerima">
<input id="pic" readonly>

<button class="primary" onclick="tambah()">Tambah</button>
<div id="spinner" class="spinner"></div>
</div>

<div id="log" class="card" style="display:none">

<input id="search" placeholder="Cari..." onkeyup="render()">

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<table>
<thead>
<tr>
<th>Tanggal</th><th>Pengirim</th><th>Jenis</th>
<th>Penerima</th><th>PIC</th><th>Status</th>
<th>Foto</th><th>Aksi</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div id="mobileList" class="mobile-list"></div>

</div>

</div>

<script>

// 🔥 CONFIG FIREBASE

}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const storage = firebase.storage()

// 🔐 USER
let currentUser = localStorage.getItem("pic_user")
if(!currentUser) location.href="dokumen.html"

document.getElementById("userDisplay").innerText=currentUser
document.getElementById("pic").value=currentUser

// STATE
let data=[]
let currentFilter="all"
let currentPage=1
const rowsPerPage=10
let selectedId=null

// NAV
function showPage(p){
["dashboard","input","log"].forEach(id=>{
document.getElementById(id).style.display="none"
})
document.getElementById(p).style.display="block"
}

// FILTER
function filterStatus(status){
currentFilter = currentFilter===status ? "all" : status
currentPage=1
showPage("log")
render()
}

// 🔥 LOAD DATA (FIREBASE)
async function loadData(){
const snapshot = await db.collection("dokumen")
.orderBy("tanggal","desc")
.get()

data = snapshot.docs.map(doc=>({
id:doc.id,
...doc.data()
}))

render()
}

loadData()

// RENDER
function render(){

const search=document.getElementById("search").value.toLowerCase()
const tbody=document.getElementById("tableBody")
const mobile=document.getElementById("mobileList")

tbody.innerHTML=""
mobile.innerHTML=""

let filtered=data.filter(d=>
(d.pengirim||"").toLowerCase().includes(search) ||
(d.penerima||"").toLowerCase().includes(search)
)

if(currentFilter!=="all"){
filtered=filtered.filter(d=>d.status===currentFilter)
}

// pagination
const start=(currentPage-1)*rowsPerPage
const pageData=filtered.slice(start,start+rowsPerPage)

let pending=0
let done=0

pageData.forEach(d=>{

if(d.status==="Pending") pending++
if(d.status==="Selesai") done++

tbody.innerHTML+=`
<tr>
<td>${new Date(d.tanggal.seconds*1000).toLocaleDateString()}</td>
<td>${d.pengirim}</td>
<td>${d.jenis}</td>
<td>${d.penerima}</td>
<td>${d.pic}</td>
<td>${d.status}</td>
<td>${d.foto?`<img src="${d.foto}" class="preview-img">`:"-"}</td>
<td>
${d.status=="Pending"
?`<button class="btn-green" onclick="openCamera('${d.id}')">Diterima</button>`:""}
${d.pic===currentUser
?`<button class="btn-red" onclick="hapus('${d.id}')">Delete</button>`:""}
</td>
</tr>
`

mobile.innerHTML+=`
<div class="mobile-card">
<div>${d.pengirim} → ${d.penerima}</div>
<div>${d.status}</div>
<div class="mobile-actions">
${d.status=="Pending"
?`<button class="btn-green" onclick="openCamera('${d.id}')">Diterima</button>`:""}
</div>
</div>
`
})

document.getElementById("total").innerText=data.length
document.getElementById("pending").innerText=pending
document.getElementById("done").innerText=done

}

// ➕ TAMBAH
async function tambah(){

await db.collection("dokumen").add({
tanggal:new Date(),
pengirim:pengirim.value,
jenis:jenis.value,
penerima:penerima.value,
pic:currentUser,
status:"Pending",
foto:""
})

pengirim.value=""
penerima.value=""

loadData()
}

// 📷 CAMERA
function openCamera(id){
selectedId=id
document.getElementById("cameraInput").click()
}

// 📤 UPLOAD FOTO
cameraInput.addEventListener("change", async function(){

const file=this.files[0]
if(!file) return

const ref = storage.ref("foto/"+Date.now())

await ref.put(file)

const url = await ref.getDownloadURL()

await db.collection("dokumen").doc(selectedId).update({
status:"Selesai",
foto:url
})

alert("Berhasil upload & update")

loadData()

})

// ❌ DELETE
async function hapus(id){
if(confirm("Hapus?")){
await db.collection("dokumen").doc(id).delete()
loadData()
}
}

// 🚪 LOGOUT
function logout(){
localStorage.removeItem("pic_user")
location.href="dokumen.html"
}

</script>
