<!DOCTYPE html>
<html lang="id">

<head>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>Sistem Log Dokumen</title>
<script src="app.js"></script>
</head>

<body>

<header class="header">

<div class="header-top">

<div class="title">
Sistem Log Dokumen - <span id="userDisplay"></span>
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<div class="nav">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('input')">Input</button>
<button onclick="showPage('log')">Log Dokumen</button>

</div>

</header>


<div class="container">

<!-- DASHBOARD -->

<div id="dashboard" class="card">

<h2>Dashboard</h2>

<div class="stats">

<div class="stat" onclick="filterStatus('all')">
Total
<h3 id="total">0</h3>
</div>

<div class="stat" onclick="filterStatus('Pending')">
Pending
<h3 id="pending">0</h3>
</div>

<div class="stat" onclick="filterStatus('Selesai')">
Selesai
<h3 id="done">0</h3>
</div>
</div>

</div>

</div>


<!-- INPUT -->

<div id="input" class="card" style="display:none">

<h2>Input Paket</h2>

<input id="pengirim" placeholder="Pengirim">

<select id="jenis">
<option>Surat</option>
<option>Barang</option>
<option>Makanan</option>
</select>

<input id="penerima" placeholder="Penerima">

<input id="pic" readonly>

<button class="primary" onclick="tambah()">Tambah</button>

<div id="spinner" class="spinner"></div>

</div>

<div id="uploadSpinner" class="spinner"></div>
<!-- LOG -->

<div id="log" class="card" style="display:none">

<input 
id="search"
placeholder="Cari dokumen..."
onkeyup="render()"
>

<input 
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
style="display:none"
>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Pengirim</th>
<th>Jenis</th>
<th>Penerima</th>
<th>PIC</th>
<th>Jam</th>
<th>Status</th>
<th>Foto</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
  
<div id="pagination" style="margin-top:15px;text-align:center">

<button onclick="prevPage()">Previous</button>

<span id="pageInfo" style="margin:0 10px"></span>

<button onclick="nextPage()">Next</button>

</div>
<div id="mobileList" class="mobile-list"></div>

</div>

</div>

  </div>
</div>

<div class="footer">
© 2026 TrackDocMAP
</div>

</body>
</html>
