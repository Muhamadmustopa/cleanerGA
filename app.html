<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sistem Log Dokumen</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<link rel="icon" href="data:,">

<style>
body{font-family:Segoe UI;margin:0;background:#f1f5f9}
.header{background:#1e3a8a;color:#fff;padding:15px}
.nav button{margin:5px;padding:8px 12px}
.container{padding:15px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input,select{display:block;margin:10px 0;padding:8px;width:100%}
button{cursor:pointer}
.primary{background:#1e3a8a;color:#fff;border:none;padding:10px}
.btn-green{background:green;color:#fff;border:none;padding:5px}
.btn-red{background:red;color:#fff;border:none;padding:5px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
.preview-img{width:60px}
</style>

</head>

<body>

<header class="header">
<div>
<b>Sistem Log Dokumen - <span id="userDisplay"></span></b>
<button onclick="logout()" style="float:right">Logout</button>
</div>

<div class="nav">
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('input')">Input</button>
<button onclick="showPage('log')">Log Dokumen</button>
</div>
</header>

<div class="container">

<div id="dashboard" class="card">
<h3>Dashboard</h3>
<div>Total: <b id="total">0</b></div>
<div>Pending: <b id="pending">0</b></div>
<div>Selesai: <b id="done">0</b></div>
</div>

<div id="input" class="card" style="display:none">
<h3>Input</h3>

<input id="pengirim" placeholder="Pengirim">
<select id="jenis">
<option>Surat</option>
<option>Barang</option>
<option>Makanan</option>
</select>
<input id="penerima" placeholder="Penerima">
<input id="pic" readonly>

<button class="primary" onclick="tambah()">Tambah</button>
</div>

<div id="log" class="card" style="display:none">

<input id="search" placeholder="Cari..." onkeyup="render()">

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Pengirim</th>
<th>Jenis</th>
<th>Penerima</th>
<th>PIC</th>
<th>Status</th>
<th>Foto</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

</div>

<script>

// 🔥 FIREBASE CONFIG (FIX)
const firebaseConfig = {
  apiKey: "AIzaSyDfwgOnJzXn8ESDw-9siMhYP-TFJcuNFx4",
  authDomain: "tracking-doc-96d7f.firebaseapp.com",
  projectId: "tracking-doc-96d7f",
  storageBucket: "tracking-doc-96d7f.appspot.com",
  messagingSenderId: "511985866729",
  appId: "1:511985866729:web:68bf00705f680b55159d78"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// USER
let currentUser = localStorage.getItem("pic_user");
if(!currentUser) location.href="dokumen.html";

document.getElementById("userDisplay").innerText=currentUser;
document.getElementById("pic").value=currentUser;

// STATE
let data=[];
let selectedId=null;

// NAV
function showPage(p){
["dashboard","input","log"].forEach(id=>{
document.getElementById(id).style.display="none";
});
document.getElementById(p).style.display="block";
}

// LOAD DATA
async function loadData(){
const snapshot = await db.collection("dokumen").orderBy("tanggal","desc").get();
data = snapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
render();
}
loadData();

// RENDER
function render(){

const search=document.getElementById("search").value.toLowerCase();
const tbody=document.getElementById("tableBody");
tbody.innerHTML="";

let pending=0;
let done=0;

data.forEach(d=>{

if(d.status==="Pending") pending++;
if(d.status==="Selesai") done++;

if(
(d.pengirim||"").toLowerCase().includes(search) ||
(d.penerima||"").toLowerCase().includes(search)
){

tbody.innerHTML+=`
<tr>
<td>${new Date(d.tanggal.seconds*1000).toLocaleDateString()}</td>
<td>${d.pengirim}</td>
<td>${d.jenis}</td>
<td>${d.penerima}</td>
<td>${d.pic}</td>
<td>${d.status}</td>
<td>${d.foto?`<img src="${d.foto}" class="preview-img">`:"-"}</td>
<td>
${d.status=="Pending"
?`<button class="btn-green" onclick="openCamera('${d.id}')">Diterima</button>`:""}
</td>
</tr>
`;
}

});

document.getElementById("total").innerText=data.length;
document.getElementById("pending").innerText=pending;
document.getElementById("done").innerText=done;

}

// TAMBAH
async function tambah(){

await db.collection("dokumen").add({
tanggal:new Date(),
pengirim:pengirim.value,
jenis:jenis.value,
penerima:penerima.value,
pic:currentUser,
status:"Pending",
foto:""
});

pengirim.value="";
penerima.value="";

loadData();
}

// CAMERA
function openCamera(id){
selectedId=id;
document.getElementById("cameraInput").click();
}

// UPLOAD FOTO
cameraInput.addEventListener("change", async function(){

const file=this.files[0];
if(!file) return;

const ref = storage.ref("foto/"+Date.now());

await ref.put(file);

const url = await ref.getDownloadURL();

await db.collection("dokumen").doc(selectedId).update({
status:"Selesai",
foto:url
});

alert("Berhasil upload");

loadData();

});

// LOGOUT
function logout(){
localStorage.removeItem("pic_user");
location.href="dokumen.html";
}

</script>

</body>
</html>
