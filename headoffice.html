<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inspection Head Office</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Segoe UI;
background:#eef2f7;
display:flex;
}

/* SIDEBAR TEMPLATE */
.sidebar{
width:230px;
background:#13233f;
min-height:100vh;
color:#fff;
padding:20px 15px;
position:fixed;
left:0;
top:0;
}

.profile{
text-align:center;
margin-bottom:30px;
}

.profile img{
width:70px;
height:70px;
border-radius:50%;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:12px;
border-radius:8px;
margin-bottom:8px;
}

.menu a:hover,
.menu a.active{
background:#1f3a63;
}

/* MAIN */
.main{
margin-left:230px;
width:100%;
}

/* TOPBAR */
.topbar{
background:#0f172a;
color:white;
padding:15px 25px;
font-weight:600;
}

/* CONTENT */
.content{
padding:20px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
overflow:auto;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
background:#00ff00;
padding:10px;
border:1px solid #bbb;
}

td{
padding:8px;
border:1px solid #ccc;
}

.check{
transform:scale(1.3);
cursor:pointer;
}

input[type=file]{
font-size:12px;
}

/* MOBILE */
@media(max-width:768px){

.sidebar{
left:-230px;
transition:.3s;
z-index:999;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
}

.menuBtn{
display:inline-block;
margin-right:15px;
cursor:pointer;
}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="profile">
<img id="fotoUser">
<div id="namaUser"></div>
</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a class="active" href="headoffice.html">Inspeksi Head Office</a>
<a href="warehouse.html">Inspeksi Warehouse</a>
<a href="kendaraan.html">Inspeksi Kendaraan</a>
<a href="k3.html">Inspeksi K3</a>
<a href="maintenance.html">Maintenance</a>
<hr>
<a href="#" onclick="logout()">Logout</a>
</div>

</div>


<div class="main">

<div class="topbar">
<span class="menuBtn" onclick="toggleMenu()">☰</span>
Inspection Head Office
</div>


<div class="content">

<div class="card">

<label>Tanggal :</label>
<input type="date" id="tgl">

<br><br>

<table id="tbl">
<thead>
<tr>
<th>No</th>
<th>Location</th>
<th>Indicator</th>
<th>Checklist</th>
<th>Lampiran</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<br>

<button onclick="saveData()">
Simpan Inspeksi
</button>

</div>
</div>
</div>


<script>
function toggleMenu(){
document.getElementById('sidebar')
.classList.toggle('active');
}

/* indikator checklist */
const items=[
["Receptionist/Lobby","Lantai bersih dan tidak licin"],
["Receptionist/Lobby","Dinding bersih tidak ada sabang2 atap plafon"],
["Receptionist/Lobby","Sofa dan meja bersih air minum terisi"],
["Receptionist/Lobby","Front desk rapi"],
["Receptionist/Lobby","AC berfungsi baik/dingin"],
["Receptionist/Lobby","Akrilik dan screen TV bersih dari debu"],
["Receptionist/Lobby","Pencahayaan Lampu Baik"],
["Receptionist/Lobby","CCTV Berfungsi baik"],
  

["Ruang Meeting","Lantai Vynil Bersih dan Karpet tidak kotor/bau"],
["Ruang Meeting","Meja kursi layak pakai/tidak rusak"],
["Ruang Meeting","LED TV bersih dan akrilik bersih"],
["Ruang Meeting","Buffet Lemari tidak ada debu dan Air minum tersedia"],
["Ruang Meeting","Pintu Sliding tidak macet"],
["Ruang Meeting","Pencahayaan Lampu Baik"],
["Ruang Meeting","CCTV Berfungsi baik"],
["Ruang Meeting","AC Berfungsi baik/dingin"]
];

let html="";

items.forEach((x,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${x[0]}</td>
<td>${x[1]}</td>

<td style="text-align:center">
<input 
type="checkbox"
class="check">
</td>

<td>
<input type="file">
</td>

</tr>
`;
});

tbody.innerHTML=html;
</script>


<script type="module">
import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
apiKey:"YOURKEY",
projectId:"YOURPROJECT"
});

const db=getFirestore(app);

/* CLOUDINARY */
async function uploadPhoto(file){

const fd=new FormData();
fd.append("file",file);
fd.append("upload_preset","YOUR_PRESET");

const r=await fetch(
"https://api.cloudinary.com/v1_1/YOURCLOUD/image/upload",
{
method:"POST",
body:fd
});

let d=await r.json();
return d.secure_url;
}


window.saveData=async()=>{

const rows=document.querySelectorAll("#tbl tbody tr");

let detail=[];

for(let row of rows){

let cek=
row.querySelector(".check").checked;

let file=
row.querySelector('input[type=file]').files[0];

let foto="";

if(file){
foto=await uploadPhoto(file);
}

detail.push({
location:row.cells[1].innerText,
indicator:row.cells[2].innerText,
checklist:cek,
lampiran:foto
});

}

await addDoc(
collection(db,"inspeksiHO"),
{
tanggal:tgl.value,
items:detail,
createdAt:new Date()
});

alert("Data tersimpan");
}
</script>

</body>
</html>
