<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Cleaner Daily</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  padding:16px;
  font-family:Segoe UI,Arial;
  background:linear-gradient(180deg,#e3f2fd,#f4f6f8);
}
.card{
  max-width:900px;
  margin:auto;
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logout{
  background:#f44336;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:12px;
}
label{font-weight:600;font-size:14px}
select,input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-top:6px;
}
.task-card{
  border:1px solid #e0e0e0;
  border-radius:14px;
  padding:12px;
  margin-top:12px;
}
.task-area{color:#1976d2;font-weight:600}
.save{
  width:100%;
  margin-top:18px;
  padding:14px;
  background:#4CAF50;
  color:#fff;
  border:none;
  border-radius:14px;
}
.loading{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.7);
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div class="card">
  <div class="header">
    <div>
      <b>Checklist Cleaner Harian</b><br>
      <small>Upload + Cloudinary</small>
    </div>
    <button class="logout" onclick="logout()">Keluar</button>
  </div>

  <label>Nama Cleaner</label>
  <select id="cleaner">
    <option value="">-- Pilih --</option>
    <option>Irfan Affandi</option>
    <option>Evillia Agustin</option>
  </select>

  <label>Lokasi</label>
  <select id="lokasi" onchange="renderTask()">
    <option value="">-- Pilih --</option>
    <option value="MTH">MTH</option>
    <option value="BIZ">BIZ</option>
  </select>

  <label>Tanggal</label>
  <input type="date" id="tanggal">

  <label>Jam Mulai</label>
  <input type="time" id="jamMulai" value="07:00" min="07:00" max="18:00">

  <label>Jam Selesai</label>
  <input type="time" id="jamSelesai" value="18:00" min="07:00" max="18:00">

  <div id="taskContainer"></div>

  <button class="save" onclick="simpan()">Simpan</button>
</div>

<div class="loading" id="loading">Loading...</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzdj8x5eVnC9xGOTOfj-TVc-HN-a5khZtJepv0G4VNqzw_TX__Yle3VXVOySXLc_lY-/exec";

/* 🔥 GANTI INI */
const CLOUD_NAME = "duonehce3";
const UPLOAD_PRESET = "cleaner_upload";

document.getElementById("tanggal").valueAsDate = new Date();

const taskByLocation = {
 MTH:[
    {area:'Area Kerja',task:'Sapu & Pel Lantai'},
    {area:'Area Kerja',task:'Vacum Karpet Lantai'},
    {area:'Area Kerja',task:'Lap Pintu Kaca'},
    {area:'Area Kerja',task:'Menyalakan Lampu, AC, dan Air Purifier'},
    {area:'Area Kerja',task:'Bersihkan meja, kursi, lemari, Akrilik, Screen TV'},
    {area:'Area Kerja',task:'Membersihkan sudut tembok atas langit-langit dari debu'},
    {area:'Area Kerja',task:'Menyiapkan minum untuk BoD'},
    {area:'Area Kerja',task:'Menjaga Meja Receptionist'},
    {area:'Area Kerja',task:'Membersihkan tempat sampah'},
    {area:'Area Kerja',task:'Merapihkan area Ruang Meeting'},
    {area:'Pantry',task:'Buang sampah ke TPS'},
    {area:'Pantry',task:'Bersihkan alat makan & wastafel'},
    {area:'Pantry',task:'Lap kulkas secara berkala'},
    {area:'Pantry',task:'Sapu Pel Lantai'},
    {area:'Pantry',task:'Refill Air Galon'},
    {area:'Service',task:'Pembelian Sarapan Pagi'},
    {area:'Service',task:'Pembelian Makan Siang Tepat Waktu'},
    {area:'Service',task:'Membantu Karyawan (Isi catatan keterangan)'}
  ],
  BIZ:[
    {area:'Gudang',task:'Sapu & Pel Lantai Gudang'},
    {area:'Gudang',task:'Sapu halaman depan'},
    {area:'Gudang',task:'Bersihkan racking & dus produk'},
    {area:'Gudang',task:'Bersihkan sarang di langit-langit'},
    {area:'Gudang',task:'Menyiram tanaman'},
    {area:'Office',task:'Sapu & Pel Lantai'},
    {area:'Office',task:'Bersihkan meja kerja semua & ruang meeting'},
    {area:'Pantry',task:'Bersihkan pantry & wastafel'},
    {area:'Toilet',task:'Bersihkan closet dan seluruh area toilet B05 dan C01'},
    {area:'Service',task:'Pembelian Sarapan Pagi'},
    {area:'Service',task:'Pembelian Makan Siang Tepat Waktu'},
    {area:'Service',task:'Membantu Karyawan (Isi catatan keterangan)'}
  ]
};

function renderTask(){
  const lokasi = document.getElementById('lokasi').value;
  const container = document.getElementById('taskContainer');
  container.innerHTML='';

  if(!lokasi) return;

  taskByLocation[lokasi].forEach((t,i)=>{
    container.innerHTML += `
    <div class="task-card">
      <div class="task-area">${t.area}</div>
      <div>${t.task}</div>

      <input type="checkbox" id="check${i}"> Selesai

      <input type="text" id="note${i}" placeholder="Catatan">

      <input type="file" id="photo${i}" accept="image/*">
    </div>`;
  });
}

/* 🔥 UPLOAD CLOUDINARY */
async function uploadToCloudinary(file){
  const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(url,{method:"POST",body:fd});
  const data = await res.json();
  return data.secure_url;
}

async function simpan(){

  const cleaner = cleaner.value;
  const lokasi = lokasi.value;
  const tanggal = tanggal.value;
  const jamMulai = document.getElementById('jamMulai').value;
  const jamSelesai = document.getElementById('jamSelesai').value;

  if(!cleaner || !lokasi){
    alert("Lengkapi data!");
    return;
  }

  loading.style.display="flex";

  const payload=[];

  for(let i=0;i<taskByLocation[lokasi].length;i++){

    let photoUrl="";

    const file = document.getElementById('photo'+i).files[0];

    if(file){
      if(file.size > 2000000){
        alert("Max 2MB");
        loading.style.display="none";
        return;
      }
      photoUrl = await uploadToCloudinary(file);
    }

    payload.push({
      cleaner,
      lokasi,
      tanggal,
      jamMulai,
      jamSelesai,
      area:taskByLocation[lokasi][i].area,
      task:taskByLocation[lokasi][i].task,
      status:document.getElementById('check'+i).checked ? 'SELESAI' : 'BELUM',
      catatan:document.getElementById('note'+i).value,
      foto: photoUrl
    });
  }

  await fetch(SCRIPT_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:"data="+encodeURIComponent(JSON.stringify(payload))
  });

  alert("Berhasil disimpan");
  location.reload();
}

function logout(){
  localStorage.clear();
  location.href="login.html";
}

</script>
</body>
</html>
