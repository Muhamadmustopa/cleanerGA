<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Document Tracking System</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Segoe UI;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
background:linear-gradient(rgba(30,58,138,0.75),rgba(30,58,138,0.75)),
url("https://images.unsplash.com/photo-1586281380349-632531db7ed4");
background-size:cover;
background-position:center;
}

/* overlay pattern */

body::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/cubes.png");
opacity:0.15;
pointer-events:none;
z-index:0;
}

/* title system */

.system-title{
position:absolute;
top:60px;
font-size:32px;
font-weight:700;
color:white;
z-index:1;
text-align:center;
}

/* login card */

.card{
position:relative;
z-index:1;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:35px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
width:320px;
color:white;
animation:fadeIn 0.7s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card h2{
margin-top:0;
text-align:center;
margin-bottom:20px;
font-weight:600;
}

/* form */

.form-group{
margin-bottom:15px;
}

select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:14px;
outline:none;
}

/* PIN dots */

.pin-container{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:15px;
}

.pin-dot{
width:18px;
height:18px;
border-radius:50%;
border:2px solid white;
}

.pin-dot.filled{
background:white;
}

/* hidden input */

#password{
opacity:0;
position:absolute;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-1px);
}

/* footer */

.footer{
margin-top:15px;
font-size:12px;
text-align:center;
opacity:0.8;
}

/* mobile */

@media(max-width:480px){

.card{
width:90%;
padding:25px;
}

.system-title{
font-size:24px;
top:40px;
}

}

</style>

</head>

<body>

<div class="system-title">
Document Tracking System
</div>

<div class="card">

<h2>📄 Login PIC</h2>

<div class="form-group">
<select id="user">
<option>Abdul Apso</option>
<option>Irfan Affandi</option>
<option>Evilia Agustin</option>
<option>Ahmad Yani</option>
<option>Topa</option>
</select>
</div>

<!-- PIN DOTS -->

<div class="pin-container">
<div class="pin-dot" id="d1"></div>
<div class="pin-dot" id="d2"></div>
<div class="pin-dot" id="d3"></div>
<div class="pin-dot" id="d4"></div>
</div>

<input type="password" id="password" maxlength="4">

<button onclick="login()">Masuk</button>

<div class="footer">
Sistem Log Dokumen Receptionist
</div>

</div>

<script>

const input=document.getElementById("password")

document.body.addEventListener("click",()=>{
input.focus()
})

input.addEventListener("input",function(){

const val=input.value

for(let i=1;i<=4;i++){
document.getElementById("d"+i).classList.remove("filled")
}

for(let i=0;i<val.length;i++){
document.getElementById("d"+(i+1)).classList.add("filled")
}

})

function login(){

const user=document.getElementById("user").value
const pass=document.getElementById("password").value

/* PASSWORD */

if(pass==="1111"){

localStorage.setItem("pic_user",user)

window.location.href="app.html"

}else{

alert("Password salah")

input.value=""
document.querySelectorAll(".pin-dot").forEach(d=>d.classList.remove("filled"))

}

}

</script>

</body>
</html>
