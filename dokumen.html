<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sistem Log Dokumen</title>

<style>

*{box-sizing:border-box}

body{
font-family:Segoe UI;
margin:0;
background:#f1f5f9;
}

header{
background:#1e3a8a;
color:white;
padding:15px;
font-weight:bold;
}

.nav{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.nav button{
background:white;
color:#1e3a8a;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

button.primary{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

.status-pending{color:#dc2626;font-weight:bold;}
.status-done{color:#16a34a;font-weight:bold;}

.actions{display:flex;gap:5px}

.btn-green{
background:#16a34a;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.btn-red{
background:#dc2626;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.preview-img{
width:60px;
border-radius:6px;
}

.spinner{
display:none;
width:30px;
height:30px;
border:4px solid #e5e7eb;
border-top:4px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
margin-top:10px;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:8px;
display:none;
}

.logout-btn{
position:absolute;
right:15px;
top:15px;
background:#dc2626;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="loginPage" class="container">

<div class="card">

<h2>Login PIC</h2>

<select id="user">
<option>Abdul Apso</option>
<option>Irfan Affandi</option>
<option>Evilia Agustin</option>
<option>Ahmad Yani</option>
<option>Topa</option>
</select>

<input type="password" id="password" placeholder="Password">

<button class="primary" onclick="login()">Masuk</button>

</div>

</div>

<div id="app" style="display:none">

<header style="position:relative">

Sistem Log Dokumen in Receptionist - <span id="userDisplay"></span>

<button class="logout-btn" onclick="logout()">Keluar</button>

<div class="nav">
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('input')">Input Paket</button>
<button onclick="showPage('log')">Log Dokumen</button>
</div>

</header>

<div class="container">

<div id="dashboard" class="card">

<h2>Dashboard</h2>

Total : <b id="total">0</b> |
Pending : <b id="pending">0</b> |
Selesai : <b id="done">0</b>

</div>

<div id="input" class="card" style="display:none">

<h2>Input Paket</h2>

<input id="pengirim" placeholder="Pengirim">

<select id="jenis">
<option>Surat</option>
<option>Barang</option>
<option>Makanan</option>
</select>

<input id="penerima" placeholder="Penerima">

<input id="pic" readonly>

<button class="primary" onclick="tambah()">Tambah</button>

<div id="spinner" class="spinner"></div>

</div>

<div id="log" class="card" style="display:none">

<input id="search" placeholder="Cari dokumen..." onkeyup="render()">

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Pengirim</th>
<th>Jenis</th>
<th>Penerima</th>
<th>PIC</th>
<th>Jam</th>
<th>Status</th>
<th>Foto</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzDZSLNVKsWxMVLBjI2lREtfcd1MrLVGLw_VC2rfaM-_Hb1Zx7ndmomQmFtjJKaP31uoQ/exec"

let currentUser=""
let data=[]
let selectedRow=null

function login(){

const pass=document.getElementById("password").value

if(pass==="1"){

currentUser=document.getElementById("user").value

document.getElementById("loginPage").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("pic").value=currentUser
document.getElementById("userDisplay").innerText=currentUser

loadData()

}else{
alert("Password salah")
}

}

function showPage(p){

["dashboard","input","log"].forEach(id=>{
document.getElementById(id).style.display="none"
})

document.getElementById(p).style.display="block"

}

async function loadData(){

const res=await fetch(scriptURL)
const raw=await res.json()

data=raw.map((d,i)=>({
...d,
_row:i+2
}))

render()

}

function render(){

const tbody=document.getElementById("tableBody")
tbody.innerHTML=""

let pending=0
let done=0

data.forEach(d=>{

if(d.status==="Pending")pending++
if(d.status==="Selesai")done++

tbody.innerHTML+=`

<tr>

<td>${formatTanggal(d.tanggal)}</td>
<td>${d.pengirim||""}</td>
<td>${d.jenis||""}</td>
<td>${d.penerima||""}</td>
<td>${d.pic||""}</td>
<td>${d.jam||"-"}</td>

<td class="${d.status=="Pending"?"status-pending":"status-done"}">
${d.status||""}
</td>

<td>
${d.foto?`<img src="${d.foto}" class="preview-img">`:"-"}
</td>

<td>

${d.status=="Pending"
?`<button class="btn-green" onclick="openCamera(${d._row})">Diterima</button>`
:""}

${d.pic===currentUser
?`<button class="btn-red" onclick="hapus(${d._row})">Delete</button>`
:""}

</td>

</tr>

`

})

document.getElementById("total").innerText=data.length
document.getElementById("pending").innerText=pending
document.getElementById("done").innerText=done

}

function formatTanggal(t){
const date=new Date(t)
return date.toLocaleDateString("id-ID")
}

function openCamera(row){
selectedRow=row
document.getElementById("cameraInput").click()
}

/* FOTO COMPRESS */

document.getElementById("cameraInput").addEventListener("change",function(){

const file=this.files[0]
if(!file)return

const img=new Image()
const reader=new FileReader()

reader.onload=e=>{
img.src=e.target.result
}

img.onload=async ()=>{

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

const max=800
let w=img.width
let h=img.height

if(w>max){
h*=max/w
w=max
}

canvas.width=w
canvas.height=h

ctx.drawImage(img,0,0,w,h)

/* compress quality */
const base64=canvas.toDataURL("image/jpeg",0.5).split(",")[1]

await fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
action:"terima",
row:selectedRow,
foto:base64
})
})

alert("Dokumen diterima")

setTimeout(loadData,1500)

}

reader.readAsDataURL(file)

})

async function tambah(){

await fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({

action:"add",
tanggal:new Date().toISOString(),
pengirim:document.getElementById("pengirim").value,
jenis:document.getElementById("jenis").value,
penerima:document.getElementById("penerima").value,
pic:currentUser

})
})

loadData()

}

async function hapus(row){

await fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
action:"delete",
row:row
})
})

setTimeout(loadData,1000)

}

function logout(){
location.reload()
}

</script>

<div id="toast" class="toast">
Data berhasil ditambahkan
</div>

</body>
</html>
