<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Dokumen Receptionist</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
margin:0;
padding:20px;
}

.card{
background:white;
border-radius:18px;
padding:20px;
max-width:1000px;
margin:auto;
box-shadow:0 15px 35px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-top:0;
color:#1e3a8a;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #d1d5db;
margin-top:6px;
font-size:14px;
}

button{
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.add-btn{
background:#2563eb;
color:white;
margin-top:10px;
width:100%;
}

.receive-btn{
background:#16a34a;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

.status-pending{
color:#dc2626;
font-weight:600;
}

.status-done{
color:#16a34a;
font-weight:600;
}

.table-container{
overflow-x:auto;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

th{
background:#f1f5f9;
}

.search{
margin-top:10px;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:#fff;
padding:12px 16px;
border-radius:10px;
display:none;
}

@media(max-width:600px){

h2{
font-size:18px;
}

th,td{
font-size:12px;
}

}

</style>
</head>

<body>

<div class="card">

<h2>📦 Log Dokumen Receptionist</h2>

<label>Pengirim</label>
<input id="pengirim" placeholder="Nama pengirim / kurir">

<label>Jenis Dokumen</label>
<select id="jenis">
<option value="">Pilih</option>
<option>Surat/Berkas</option>
<option>Barang</option>
<option>Makanan</option>
</select>

<label>Penerima</label>
<input id="penerima" placeholder="Nama penerima">

<button class="add-btn" onclick="tambah()">Tambah Dokumen</button>

<input class="search" id="search" placeholder="🔍 Cari dokumen..." onkeyup="render()">

<div class="table-container">

<table>

<thead>

<tr>
<th>Tanggal</th>
<th>Pengirim</th>
<th>Jenis</th>
<th>Penerima</th>
<th>Jam Terima</th>
<th>Status</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<div class="toast" id="toast"></div>

<script>

let data = JSON.parse(localStorage.getItem("dokumen")) || []

function simpan(){
localStorage.setItem("dokumen",JSON.stringify(data))
}

function showToast(msg){
const toast=document.getElementById("toast")
toast.innerText=msg
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)
}

function tambah(){

const pengirim=document.getElementById("pengirim").value
const jenis=document.getElementById("jenis").value
const penerima=document.getElementById("penerima").value

if(!pengirim || !jenis || !penerima){
alert("Lengkapi data dulu")
return
}

const tanggal=new Date().toLocaleDateString()

data.push({
tanggal,
pengirim,
jenis,
penerima,
jam:"",
status:"Pending"
})

simpan()
render()

document.getElementById("pengirim").value=""
document.getElementById("penerima").value=""

showToast("Dokumen berhasil ditambahkan")

}

function render(){

const search=document.getElementById("search").value.toLowerCase()

const tbody=document.getElementById("tableBody")
tbody.innerHTML=""

data
.filter(d=>
d.pengirim.toLowerCase().includes(search) ||
d.penerima.toLowerCase().includes(search)
)
.forEach((d,i)=>{

const statusClass=d.status=="Pending"?"status-pending":"status-done"

tbody.innerHTML+=`

<tr>

<td>${d.tanggal}</td>
<td>${d.pengirim}</td>
<td>${d.jenis}</td>
<td>${d.penerima}</td>
<td>${d.jam || "-"}</td>

<td class="${statusClass}">
${d.status}
</td>

<td>

${d.status=="Pending"
?`<button class="receive-btn" onclick="terima(${i})">Diterima</button>`
:""}

<button class="delete-btn" onclick="hapus(${i})">Delete</button>

</td>

</tr>

`

})

}

function terima(i){

data[i].jam=new Date().toLocaleTimeString()
data[i].status="Selesai"

simpan()
render()

showToast("Dokumen sudah diterima")

}

function hapus(i){

if(confirm("Hapus data?")){
data.splice(i,1)
simpan()
render()
}

}

render()

</script>

</body>
</html>
