<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Login PIC</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Segoe UI;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(30,58,138,0.75),rgba(30,58,138,0.75)),
url("https://images.unsplash.com/photo-1586281380349-632531db7ed4");
background-size:cover;
background-position:center;
}

/* overlay pattern */

body::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/cubes.png");
opacity:0.15;
}

/* login card */

.card{
position:relative;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:35px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
width:320px;
color:white;
animation:fadeIn 0.7s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card h2{
margin-top:0;
text-align:center;
margin-bottom:20px;
font-weight:600;
}

/* form */

.form-group{
position:relative;
margin-bottom:15px;
}

select,input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:14px;
outline:none;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-1px);
}

/* footer */

.footer{
margin-top:15px;
font-size:12px;
text-align:center;
opacity:0.8;
}

/* mobile */

@media(max-width:480px){

.card{
width:90%;
padding:25px;
}

}

</style>

</head>

<body>

<div class="card">

<h2>📄 Login PIC</h2>

<div class="form-group">
<select id="user">
<option>Abdul Apso</option>
<option>Irfan Affandi</option>
<option>Evilia Agustin</option>
<option>Ahmad Yani</option>
<option>Topa</option>
</select>
</div>

<div class="form-group">
<input type="password" id="password" placeholder="Password">
</div>

<button onclick="login()">Masuk</button>

<div class="footer">
Sistem Log Dokumen Receptionist
</div>

</div>


<script>

function login(){

const user=document.getElementById("user").value
const pass=document.getElementById("password").value

if(pass==="1"){

localStorage.setItem("pic_user",user)

window.location.href="app.html"

}else{

alert("Password salah")

}

}

</script>

</body>
</html>
