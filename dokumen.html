<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Log Dokumen Receptionist</title>

<style>

body{
font-family:Segoe UI;
background:#f1f5f9;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#1e3a8a;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

th{
background:#e2e8f0;
}

.status-pending{
color:#dc2626;
font-weight:bold;
}

.status-done{
color:#16a34a;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->

<div class="card" id="loginPage">

<h2>Login PIC</h2>

<select id="user">

<option>Abdul Apso</option>
<option>Irfan Affandi</option>
<option>Evilia Agustin</option>
<option>Ahmad Yani</option>
<option>Topa</option>

</select>

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Masuk</button>

</div>

<!-- SYSTEM -->

<div class="card" id="systemPage" style="display:none">

<h2>Log Dokumen</h2>

<label>Pengirim</label>
<input id="pengirim">

<label>Jenis</label>
<select id="jenis">
<option>Surat</option>
<option>Barang</option>
<option>Makanan</option>
</select>

<label>Penerima</label>
<input id="penerima">

<label>PIC Pengantar</label>
<input id="pic" readonly>

<button onclick="tambah()">Tambah</button>

<table>

<thead>

<tr>
<th>Tanggal</th>
<th>Pengirim</th>
<th>Jenis</th>
<th>Penerima</th>
<th>PIC</th>
<th>Jam</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const scriptURL="PASTE_LINK_GOOGLE_SCRIPT_DISINI"

let currentUser=""

function login(){

const user=document.getElementById("user").value
const pass=document.getElementById("password").value

if(pass==="1"){

currentUser=user

document.getElementById("loginPage").style.display="none"
document.getElementById("systemPage").style.display="block"

document.getElementById("pic").value=currentUser

loadData()

}

else{

alert("Password salah")

}

}



async function loadData(){

const res=await fetch(scriptURL)

const data=await res.json()

const tbody=document.getElementById("tableBody")

tbody.innerHTML=""

data.forEach(d=>{

tbody.innerHTML+=`

<tr>

<td>${d.tanggal}</td>
<td>${d.pengirim}</td>
<td>${d.jenis}</td>
<td>${d.penerima}</td>
<td>${d.pic}</td>
<td>${d.jam}</td>
<td class="${d.status=="Pending"?"status-pending":"status-done"}">${d.status}</td>

</tr>

`

})

}



async function tambah(){

const data={

tanggal:new Date().toLocaleDateString(),

pengirim:document.getElementById("pengirim").value,

jenis:document.getElementById("jenis").value,

penerima:document.getElementById("penerima").value,

pic:currentUser,

jam:"",

status:"Pending"

}

await fetch(scriptURL,{

method:"POST",

body:JSON.stringify(data)

})

loadData()

}

</script>

</body>
</html>
