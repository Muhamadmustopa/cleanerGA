<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Document Tracking System</title>

<style>

*{box-sizing:border-box;}

body{
font-family:Segoe UI;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
background:linear-gradient(rgba(30,58,138,0.75),rgba(30,58,138,0.75)),
url("https://images.unsplash.com/photo-1586281380349-632531db7ed4");
background-size:cover;
background-position:center;
}

/* pattern */

body::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/cubes.png");
opacity:0.15;
pointer-events:none;
}

/* title */

.system-title{
position:absolute;
top:60px;
font-size:30px;
font-weight:700;
color:white;
}

/* card */

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:35px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
width:320px;
color:white;
}

.card h2{
text-align:center;
margin-bottom:20px;
}

/* form */

select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
}

/* PIN */

.pin-container{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:15px;
cursor:text;
}

.pin-dot{
width:18px;
height:18px;
border-radius:50%;
border:2px solid white;
}

.pin-dot.filled{
background:white;
}

/* hidden input */

#password{
position:absolute;
opacity:0;
pointer-events:none;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.footer{
margin-top:15px;
font-size:12px;
text-align:center;
opacity:0.8;
}

</style>

</head>

<body>

<div class="system-title">
Document Tracking System
</div>

<div class="card">

<h2>📄 Login PIC</h2>

<select id="user">
<option>Abdul Apso</option>
<option>Irfan Affandi</option>
<option>Evilia Agustin</option>
<option>Ahmad Yani</option>
<option>Topa</option>
</select>

<!-- PIN -->

<div class="pin-container" onclick="focusPin()">
<div class="pin-dot" id="d1"></div>
<div class="pin-dot" id="d2"></div>
<div class="pin-dot" id="d3"></div>
<div class="pin-dot" id="d4"></div>
</div>

<input type="password" id="password" maxlength="4">

<button onclick="login()">Masuk</button>

<div class="footer">
Sistem Log Dokumen Receptionist
</div>

</div>

<script>

const input=document.getElementById("password")

function focusPin(){
input.focus()
}

input.addEventListener("input",function(){

const val=input.value

for(let i=1;i<=4;i++){
document.getElementById("d"+i).classList.remove("filled")
}

for(let i=0;i<val.length;i++){
document.getElementById("d"+(i+1)).classList.add("filled")
}

})

function login(){

const user=document.getElementById("user").value
const pass=input.value

if(pass==="1111"){

localStorage.setItem("pic_user",user)
window.location.href="app.html"

}else{

alert("Password salah")

input.value=""
document.querySelectorAll(".pin-dot").forEach(d=>d.classList.remove("filled"))

}

}

</script>

</body>
</html>
